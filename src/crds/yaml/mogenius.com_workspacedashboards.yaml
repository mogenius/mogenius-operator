---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: workspacedashboards.mogenius.com
spec:
  group: mogenius.com
  names:
    kind: WorkspaceDashboard
    listKind: WorkspaceDashboardList
    plural: workspacedashboards
    singular: workspacedashboard
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          A mogenius `WorkspaceDashboard` resource configures the workspace dashboard:
          the built-in standard components can be toggled on or off, and any number of
          resource tables can be added below them. Workspaces opt in by referencing a
          WorkspaceDashboard via `spec.dashboardRef`; several workspaces may share the
          same dashboard. Workspaces without a reference fall back to the built-in
          default layout.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              aiInsightsBanner:
                description: AiInsightsBanner toggles the AI insights banner.
                properties:
                  enabled:
                    type: boolean
                type: object
              capacitiesTile:
                description: CapacitiesTile toggles the workspace capacities tile.
                properties:
                  enabled:
                    type: boolean
                type: object
              dashboardHeader:
                description: DashboardHeader toggles the workspace header component.
                properties:
                  enabled:
                    type: boolean
                type: object
              default:
                description: |-
                  Default marks this dashboard as the cluster-wide default: it applies to
                  every workspace that does not reference a dashboard explicitly via
                  spec.dashboardRef.
                type: boolean
              membersTile:
                description: MembersTile toggles the workspace members tile.
                properties:
                  enabled:
                    type: boolean
                type: object
              resourceOverview:
                description: ResourceOverview toggles the aggregated resource overview.
                properties:
                  enabled:
                    type: boolean
                type: object
              resourceTables:
                description: |-
                  ResourceTables lists resource tables rendered below the standard
                  components, in display order.
                items:
                  description: DashboardResourceTable configures one resource table
                    shown on the dashboard.
                  properties:
                    header:
                      description: Header is the heading rendered above the table.
                      minLength: 1
                      type: string
                    resources:
                      description: Resources identifies the resource types listed
                        in this table.
                      items:
                        description: CrdReference identifies a Kubernetes resource
                          type by its API group/version and kind.
                        properties:
                          apiVersion:
                            description: |-
                              ApiVersion is the group and version of the target resource, e.g. "apps/v1" for Deployments
                              or "v1" for core resources like Services. Used together with Kind to uniquely identify the type.
                            type: string
                          kind:
                            description: Kind is the resource kind as it appears in
                              the Kubernetes API, e.g. "Deployment" or "Service".
                            type: string
                        required:
                        - apiVersion
                        - kind
                        type: object
                      minItems: 1
                      type: array
                  required:
                  - header
                  - resources
                  type: object
                type: array
            type: object
          status:
            description: |-
              omitempty keeps status optional in the generated CRD schema, so clients
              creating dashboards (e.g. the frontend via the generic resource API)
              don't have to send an empty status object.
            properties:
              conditions:
                description: |-
                  Conditions reports the results of the reconciler's integrity checks,
                  e.g. whether all referenced resource types exist in the cluster.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
