suite: deployment
templates:
  - deployment.yaml
tests:
  - it: renders with default values
    asserts:
      - isKind:
          of: Deployment
      - equal:
          path: metadata.name
          value: mogenius-operator
      - equal:
          path: spec.replicas
          value: 1
      - equal:
          path: spec.template.spec.containers[0].name
          value: mogenius-operator

  - it: uses chart appVersion as image tag when tag is not set
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "ghcr.io/mogenius/mogenius-operator:.+"

  - it: uses custom image tag when set
    set:
      image.tag: v1.2.3
    asserts:
      - equal:
          path: spec.template.spec.containers[0].image
          value: ghcr.io/mogenius/mogenius-operator:v1.2.3

  - it: sets revisionHistoryLimit from values
    set:
      revisionHistoryLimit: 5
    asserts:
      - equal:
          path: spec.revisionHistoryLimit
          value: 5

  - it: includes valkey initContainer when valkey is enabled
    set:
      valkey.enabled: true
    asserts:
      - isNotEmpty:
          path: spec.template.spec.initContainers

  - it: wires external key-value store connection when valkey is disabled
    set:
      valkey.enabled: false
      features.debugTools.enabled: false
      externalKeyValueStore.enabled: true
      externalKeyValueStore.host: my-redis.example.com
      externalKeyValueStore.port: 6380
      externalKeyValueStore.existingSecret.name: my-valkey-secret
      externalKeyValueStore.existingSecret.key: password
    asserts:
      # wait-for-valkey init container is still added for the external store
      - isNotEmpty:
          path: spec.template.spec.initContainers
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MO_VALKEY_ADDR
            value: my-redis.example.com:6380
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MO_VALKEY_PASSWORD
            valueFrom:
              secretKeyRef:
                name: my-valkey-secret
                key: password
      # no bundled valkey password checksum annotation when using an external store
      - isNull:
          path: spec.template.metadata.annotations

  - it: uses the default redis port for the external key-value store
    set:
      valkey.enabled: false
      externalKeyValueStore.enabled: true
      externalKeyValueStore.host: my-redis.example.com
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MO_VALKEY_ADDR
            value: my-redis.example.com:6379

  - it: wires username and TLS with a CA cert for the external store
    set:
      valkey.enabled: false
      externalKeyValueStore.enabled: true
      externalKeyValueStore.host: my-redis.example.com
      externalKeyValueStore.username: appuser
      externalKeyValueStore.existingSecret.name: my-redis-secret
      externalKeyValueStore.tls.enabled: true
      externalKeyValueStore.tls.caCertSecret.name: my-ca-secret
      externalKeyValueStore.tls.caCertSecret.key: ca.crt
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MO_VALKEY_USERNAME
            value: appuser
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MO_VALKEY_TLS_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MO_VALKEY_TLS_CA_CERT_FILE
            value: /etc/valkey-tls/ca.crt
      # CA certificate secret is mounted into the container
      - contains:
          path: spec.template.spec.containers[0].volumeMounts
          content:
            name: valkey-tls-ca
            mountPath: /etc/valkey-tls
            readOnly: true
      - contains:
          path: spec.template.spec.volumes
          content:
            name: valkey-tls-ca
            secret:
              secretName: my-ca-secret

  - it: enables TLS with insecureSkipVerify and no CA secret
    set:
      valkey.enabled: false
      externalKeyValueStore.enabled: true
      externalKeyValueStore.host: my-redis.example.com
      externalKeyValueStore.tls.enabled: true
      externalKeyValueStore.tls.insecureSkipVerify: true
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: MO_VALKEY_TLS_INSECURE_SKIP_VERIFY
            value: "true"
      # no CA volume is mounted when using the system trust store
      - notContains:
          path: spec.template.spec.volumes
          content:
            name: valkey-tls-ca
          any: true

  - it: fails when external store is enabled without a host
    set:
      valkey.enabled: false
      externalKeyValueStore.enabled: true
    asserts:
      - failedTemplate:
          errorMessage: "externalKeyValueStore.enabled is true: you must set externalKeyValueStore.host"

  - it: fails when neither valkey nor external store is enabled
    set:
      valkey.enabled: false
    asserts:
      - failedTemplate:
          errorMessage: "no key-value store configured: enable the bundled valkey (valkey.enabled) or an external store (externalKeyValueStore.enabled)"

  - it: fails when both valkey and external store are enabled
    set:
      valkey.enabled: true
      externalKeyValueStore.enabled: true
      externalKeyValueStore.host: my-redis.example.com
    asserts:
      - failedTemplate:
          errorMessage: "valkey.enabled and externalKeyValueStore.enabled are mutually exclusive; enable only one"

  - it: sets containerSecurityContext
    asserts:
      - equal:
          path: spec.template.spec.containers[0].securityContext.privileged
          value: false
      - equal:
          path: spec.template.spec.containers[0].securityContext.readOnlyRootFilesystem
          value: true

  - it: renders probes when enabled
    set:
      probes.enabled: true
    asserts:
      - isNotEmpty:
          path: spec.template.spec.containers[0].livenessProbe
      - isNotEmpty:
          path: spec.template.spec.containers[0].readinessProbe
      - isNotEmpty:
          path: spec.template.spec.containers[0].startupProbe

  - it: omits probes when disabled
    set:
      probes.enabled: false
    asserts:
      - isNull:
          path: spec.template.spec.containers[0].livenessProbe
      - isNull:
          path: spec.template.spec.containers[0].readinessProbe
      - isNull:
          path: spec.template.spec.containers[0].startupProbe

  - it: uses the default ServiceAccount name
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: mogenius-operator-service-account-app

  - it: uses a custom serviceAccount.name when set
    set:
      serviceAccount.name: custom-sa
    asserts:
      - equal:
          path: spec.template.spec.serviceAccountName
          value: custom-sa

  - it: adds podLabels to pod template
    set:
      podLabels:
        team: platform
        env: prod
    asserts:
      - equal:
          path: spec.template.metadata.labels.team
          value: platform
      - equal:
          path: spec.template.metadata.labels.env
          value: prod
