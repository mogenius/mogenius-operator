fullnameOverride: mogenius-operator
revisionHistoryLimit: 10

serviceAccount:
  # -- name of the ServiceAccount used by the operator (default: mogenius-operator-service-account-app)
  name: ~


# -- settings for the internal cluster communication
cluster:
  # -- the cluster domain, default for kubernetes is "cluster.local"
  domain: cluster.local
  readonly:
    # true:
    # * Full permissions for all resources in the mogenius namespace
    # * Cluster-wide read permissions for all resources
    # false: (default)
    # * Full read/write on all resources, APIs, ... Full Admin Access.
    # -- readonly operator permissions true/false (default: false)
    enabled: false

# -- feature toggles for the mogenius-operator
features:
  autoUpgrade:
    enabled: true
  debugTools:
    # -- enable the debug tools container in the mogenius-operator pod
    enabled: false
    image:
      registry: docker.io
      repository: nicolaka/netshoot
      tag: v0.16
      pullPolicy: IfNotPresent
  # -- configure the integrated node metrics dashboard
  nodeMetricsDashboard:
    # -- enable the node metrics dashboard
    enabled: false
    # -- ingress settings for the node metrics dashboard
    ingress:
      enabled: false
      ingressClassName: ~
      host: ~
      annotations: {}
      labels: {}
      tls: []
    # -- HTTPRoute settings for the node metrics dashboard
    httproute:
      enabled: false
      annotations: {}
      # -- labels to place on the HTTPRoute
      labels: {}
      # -- hostnames to place on the HTTPRoute
      hostnames: []
      # -- parentRefs to place on the HTTPRoute
      parentRefs: []


# -- image settings for the mogenius-operator and nodemetrics container
image:
  registry: ghcr.io
  repository: mogenius/mogenius-operator
  # -- tag of the image, if not set, the chart appVersion is used
  tag: ~
  pullPolicy: IfNotPresent

podSecurityContext: {}
containerSecurityContext:
  privileged: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

# -- extra labels to be added to the pod
podLabels: {}

probes:
  enabled: true
  livenessProbe:
    enabled: true
    path: /healthz
  readinessProbe:
    enabled: true
    path: /healthz
  startupProbe:
    enabled: true
    path: /healthz

nodeSelector: {}
tolerations: []
affinity: {}

resources: {}
#   limits:
#     cpu: 500m
#     ephemeral-storage: 1000Mi
#     memory: 1Gi
#   requests:
#     cpu: 250m
#     ephemeral-storage: 500Mi
#     memory: 128Mi

global:
  # -- the name you gave your cluster on the mogenius platform
  cluster_name: ~
  # -- the api key provided for your cluster by the mogenius platform (alternativly you can leave this empty and use global.apiKeySecret)
  api_key: ~
  # -- secret reference for the api-key (will be used if global.api_key is not set)
  apiKeySecret:
    secretName: mogenius-operator-api-secret
    secretKey: API_KEY

# -- environment variables to be set in the mogenius-operator deployment
envVars:
  MO_API_SERVER: "wss://k8s-ws.mogenius.com/ws"
  MO_EVENT_SERVER: "wss://k8s-dispatcher.mogenius.com/ws"

# -- Go runtime memory tuning
goRuntime:
  # -- Soft memory limit for the Go runtime (GOMEMLIMIT)
  memLimit: "180MiB"
  # -- GC target percentage (GOGC). Lower = more frequent GC, less memory
  gcPercent: "50"

metrics:
  # -- enable the Prometheus /metrics endpoint scraping (creates a Service for the ServiceMonitor)
  enabled: false
  # -- ServiceMonitor for prometheus-operator; requires metrics.enabled: true
  serviceMonitor:
    enabled: false
    # -- labels added to the ServiceMonitor (use to match your Prometheus selector)
    labels: {}
    interval: 30s
    scrapeTimeout: 10s
    # -- additional relabelings appended after the default instance relabeling
    relabelings: []

# -- use an external Redis/Valkey-compatible key-value store instead of the bundled valkey.
# -- When enabled, set valkey.enabled to false.
externalKeyValueStore:
  # -- enable using an external key-value store (mutually exclusive with valkey.enabled)
  enabled: false
  # -- hostname of the external key-value store (e.g. "my-redis.example.com")
  host: ""
  # -- port of the external key-value store (default: the standard Redis/Valkey port)
  port: 6379
  # -- optional ACL username for the external key-value store (leave empty for the default user)
  username: ""
  # -- reference to an existing secret holding the password. Leave name empty if the store requires no auth.
  existingSecret:
    # -- name of the existing secret holding the password
    name: ""
    # -- key within the existing secret that holds the password
    key: valkey-password
  # -- TLS settings for the connection to the external key-value store
  tls:
    # -- enable TLS for the connection
    enabled: false
    # -- skip TLS certificate verification (insecure; only for self-signed certs in trusted networks)
    insecureSkipVerify: false
    # -- reference to an existing secret holding a CA certificate used to verify the server.
    # -- Leave name empty to use the system trust store (e.g. for publicly-trusted managed services).
    caCertSecret:
      # -- name of the existing secret holding the CA certificate
      name: ""
      # -- key within the existing secret that holds the CA certificate
      key: ca.crt

valkey:
  # -- deploy the bundled Valkey instance. Set to false to use an external key-value store (see externalKeyValueStore)
  enabled: true
  imagePullPolicy: IfNotPresent
  image:
    registry: docker.io
    repository: valkey/valkey
    tag: 9.1.0
  podLabels: {}
  containerSecurityContext:
    readOnlyRootFilesystem: true
    runAsGroup: 999
    runAsUser: 999
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    capabilities:
      drop:
      - ALL
  podSecurityContext:
    fsGroup: 999
    runAsGroup: 999
    runAsUser: 999
    seccompProfile:
      type: RuntimeDefault
  resources: {}
  nodeSelector: {}
  tolerations: []
  affinity: {}
  port: 6379
  auth:
    password: ""
  updateStrategy:
    type: Recreate
  metrics:
    # -- enable the Prometheus metrics exporter sidecar (oliver006/redis_exporter)
    enabled: false
    exporter:
      image:
        registry: docker.io
        repository: oliver006/redis_exporter
        tag: v1.87.0
      resources: {}
      containerSecurityContext:
        readOnlyRootFilesystem: true
        runAsNonRoot: true
        allowPrivilegeEscalation: false
        capabilities:
          drop:
            - ALL
    # -- ServiceMonitor for prometheus-operator; requires metrics.enabled: true
    serviceMonitor:
      enabled: false
      # -- labels added to the ServiceMonitor (use to match your Prometheus selector)
      labels: {}
      interval: 30s
      scrapeTimeout: 10s
      # -- additional relabelings appended after the default instance relabeling
      relabelings: []
  # -- optional additional Valkey configuration appended verbatim (e.g. "maxmemory 256mb\nmaxmemory-policy allkeys-lru")
  customValkeyConf: ""
  persistence:
    # -- storage class to be used, default is empty which will use the class defined as standard
    storageClass: ""
    accessModes:
      - ReadWriteOnce
    size: 5Gi

nodeMetrics:
  # -- enable the node metrics daemonset
  enabled: true
  podLabels: {}
  resources: {}
  nodeSelector: {}
  tolerations:
    - effect: NoSchedule
      key: node-role.kubernetes.io/control-plane
      operator: Exists
  affinity: {}
  containerSecurityContext:
    readOnlyRootFilesystem: true
    capabilities:
      add:
        - NET_ADMIN
        - SYS_ADMIN
        - BPF # required for eBPF on modern kernels (Linux ≥5.8) without privileged:true
        - SYS_PTRACE # required for nsenter to open /proc/$pid/ns/net of other processes
  podSecurityContext: {}
