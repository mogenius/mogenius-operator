apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.fullnameOverride }}
  namespace: {{ .Release.Namespace }}
spec:
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  progressDeadlineSeconds: 600
  replicas: 1
  selector:
    matchLabels:
      app: {{ .Values.fullnameOverride }}
  strategy:
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: {{ .Values.fullnameOverride }}
        {{- if .Values.podLabels }}
        {{- toYaml .Values.podLabels | nindent 8 }}
        {{- end }}
      annotations:
        valkey-password-checksum: {{ include "getPasswordHash" (include "lookupSecret" .) | quote }}
    spec:
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.features.debugTools.enabled }}
      initContainers:
        - name: debug-tools-init
          image: {{ .Values.features.debugTools.image.registry }}/{{ .Values.features.debugTools.image.repository }}:{{ .Values.features.debugTools.image.tag }}
          imagePullPolicy: {{ .Values.features.debugTools.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "/usr/bin"
              cp -aL /usr/bin /netshoot/

              echo "/usr/sbin"
              cp -aL /usr/sbin /netshoot/

              echo "/bin"
              cp -aL /bin /netshoot/

              echo "/sbin"
              cp -aL /sbin /netshoot/

              echo "done"
          volumeMounts:
            - mountPath: /netshoot
              name: debug-tools
      {{- end }}
      containers:
        - name: {{ .Values.fullnameOverride }}
          image: {{ .Values.image.registry }}/{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- include "common.env" . | nindent 12 }}
            {{- if .Values.features.debugTools.enabled }}
            - name: PATH
              value: "/netshoot/usr/bin:/netshoot/bin:/netshoot/usr/sbin:/netshoot/sbin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin"
            {{- end }}
          volumeMounts:
            - mountPath: /app/helm-data
              name: helm-data
            - mountPath: /tmp
              name: tmp
            - mountPath: /app/mo-data
              name: mo-data
            {{- if .Values.features.debugTools.enabled }}
            - mountPath: /netshoot
              name: debug-tools
              readOnly: true
            {{- end }}
          ports:
            - containerPort: 1337
              name: http
              protocol: TCP
          {{- if and .Values.probes.enabled .Values.probes.startupProbe.enabled }}
          startupProbe:
            failureThreshold: 3
            httpGet:
              path: {{ .Values.probes.startupProbe.path }}
              port: 1337
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          {{- end }}
          {{- if and .Values.probes.enabled .Values.probes.readinessProbe.enabled }}
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: {{ .Values.probes.readinessProbe.path }}
              port: 1337
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          {{- end }}
          {{- if and .Values.probes.enabled .Values.probes.livenessProbe.enabled }}
          livenessProbe:
            failureThreshold: 3
            httpGet:
              path: {{ .Values.probes.livenessProbe.path }}
              port: 1337
              scheme: HTTP
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 5
          {{- end }}
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
          {{- if .Values.containerSecurityContext }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          {{- end }}
      restartPolicy: Always
      {{- if .Values.podSecurityContext }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      {{- end }}
      serviceAccountName: mogenius-operator-service-account-app
      volumes:
      - name: helm-data
        emptyDir: {}
      - name: tmp
        emptyDir: {}
      - name: mo-data
        emptyDir: {}
      {{- if .Values.features.debugTools.enabled }}
      - name: debug-tools
        emptyDir: {}
      {{- end }}
