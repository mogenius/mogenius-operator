{{-  if .Values.valkey.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.fullnameOverride }}-valkey
  namespace: {{ .Release.Namespace }}
spec:
  ports:
  - name: valkey
    port: {{ .Values.valkey.port }}
  {{- if .Values.valkey.metrics.enabled }}
  - name: metrics
    port: 9121
  {{- end }}
  selector:
    app: {{ .Values.fullnameOverride }}-valkey
{{ end }}
