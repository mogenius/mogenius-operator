name: Build Operator

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the image'
        required: false
        default: 'dev'
        type: string
  push:
    branches:
      - main
    # paths:
    #   - 'operator/**'
    #   - 'src/**'
    #   - 'go.mod'
    #   - 'go.sum'
    #   - 'Dockerfile-ng'
    #   - 'Dockerfile'
    #   - 'README.md'
    #   - '.github/workflows/build-operator.yml'


env:
  REGISTRY: ghcr.io
  REGISTRY_PREFIX: ghcr.io/mogenius
  HELMNAME: "mogenius-operator"

jobs:

  # ============================================================================
  # Prepare - Get version info
  # ============================================================================
  prepare:
    uses: mogenius/github-actions/.github/workflows/prepare.yml@e7bbc72b52b9de09d67ea692f39ab5063a175a5b # main
    secrets:
      RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
    with:
      version_override: ${{ github.event.inputs.version || '' }}
      default_version: 'dev'

  # ============================================================================
  # Build Operator - Native builds per architecture
  # ============================================================================
  operator-amd64:
    needs: [prepare]
    runs-on: arc-runner-set-amd64
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY_PREFIX }}/mogenius-operator:${{ needs.prepare.outputs.version }}-amd64
          build-args: |
            GO_BUILDER_IMAGE=${{ env.REGISTRY_PREFIX }}/go-builder:latest-amd64
            RUST_BUILDER_IMAGE=${{ env.REGISTRY_PREFIX }}/rust-builder:latest-amd64
            BPFTOOL_IMAGE=${{ env.REGISTRY_PREFIX }}/bpftool:latest-amd64
            SNOOPY_IMAGE=${{ env.REGISTRY_PREFIX }}/snoopy:latest-amd64
            RUNTIME_IMAGE=${{ env.REGISTRY_PREFIX }}/runtime:latest-amd64
            COMMIT_HASH=${{ needs.prepare.outputs.commit_hash }}
            GIT_BRANCH=${{ needs.prepare.outputs.git_branch }}
            BUILD_TIMESTAMP=${{ needs.prepare.outputs.build_timestamp }}
            VERSION=${{ needs.prepare.outputs.version }}
          # cache-from: type=gha,scope=operator-amd64
          # cache-to: type=gha,mode=max,scope=operator-amd64

  operator-arm64:
    needs: [prepare]
    runs-on: arc-runner-set-arm64
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          push: true
          tags: ${{ env.REGISTRY_PREFIX }}/mogenius-operator:${{ needs.prepare.outputs.version }}-arm64
          build-args: |
            GO_BUILDER_IMAGE=${{ env.REGISTRY_PREFIX }}/go-builder:latest-arm64
            RUST_BUILDER_IMAGE=${{ env.REGISTRY_PREFIX }}/rust-builder:latest-arm64
            BPFTOOL_IMAGE=${{ env.REGISTRY_PREFIX }}/bpftool:latest-arm64
            SNOOPY_IMAGE=${{ env.REGISTRY_PREFIX }}/snoopy:latest-arm64
            RUNTIME_IMAGE=${{ env.REGISTRY_PREFIX }}/runtime:latest-arm64
            COMMIT_HASH=${{ needs.prepare.outputs.commit_hash }}
            GIT_BRANCH=${{ needs.prepare.outputs.git_branch }}
            BUILD_TIMESTAMP=${{ needs.prepare.outputs.build_timestamp }}
            VERSION=${{ needs.prepare.outputs.version }}
          # cache-from: type=gha,scope=operator-arm64
          # cache-to: type=gha,mode=max,scope=operator-arm64

  operator-armv7:
    needs: [prepare]
    # Cross-compile on amd64 - much faster than QEMU emulation
    runs-on: arc-runner-set-amd64
    permissions:
      contents: read
      packages: write
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Note: armv7 uses arm64 bpftool image (bpftool doesn't support armv7)
      - name: Build and push
        id: build
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25 # v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm/v7
          push: true
          tags: ${{ env.REGISTRY_PREFIX }}/mogenius-operator:${{ needs.prepare.outputs.version }}-armv7
          build-args: |
            GO_BUILDER_IMAGE=${{ env.REGISTRY_PREFIX }}/go-builder:latest-amd64
            RUST_BUILDER_IMAGE=${{ env.REGISTRY_PREFIX }}/rust-builder:latest-amd64
            BPFTOOL_IMAGE=${{ env.REGISTRY_PREFIX }}/bpftool:latest-armv7
            SNOOPY_IMAGE=${{ env.REGISTRY_PREFIX }}/snoopy:latest-armv7
            RUNTIME_IMAGE=${{ env.REGISTRY_PREFIX }}/runtime:latest-armv7
            COMMIT_HASH=${{ needs.prepare.outputs.commit_hash }}
            GIT_BRANCH=${{ needs.prepare.outputs.git_branch }}
            BUILD_TIMESTAMP=${{ needs.prepare.outputs.build_timestamp }}
            VERSION=${{ needs.prepare.outputs.version }}
          # cache-from: type=gha,scope=operator-armv7
          # cache-to: type=gha,mode=max,scope=operator-armv7


  # ============================================================================
  # Create Multi-Arch Manifest
  # ============================================================================
  operator-manifest:
    needs: [prepare, operator-amd64, operator-arm64, operator-armv7]
    # runs-on: arc-runner-set-amd64
    runs-on: arc-runner-set-arm64
    permissions:
      contents: read
      packages: write
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          # Create manifest for version tag
          docker buildx imagetools create -t ${{ env.REGISTRY_PREFIX }}/mogenius-operator:${VERSION} \
            ${{ env.REGISTRY_PREFIX }}/mogenius-operator:${VERSION}-amd64 \
            ${{ env.REGISTRY_PREFIX }}/mogenius-operator:${VERSION}-arm64 \
            ${{ env.REGISTRY_PREFIX }}/mogenius-operator:${VERSION}-armv7

          # Create manifest for latest (only on main branch)
          if [ "${{ github.ref_name }}" == "main" ]; then
            docker buildx imagetools create -t ${{ env.REGISTRY_PREFIX }}/mogenius-operator:latest \
              ${{ env.REGISTRY_PREFIX }}/mogenius-operator:${VERSION}-amd64 \
              ${{ env.REGISTRY_PREFIX }}/mogenius-operator:${VERSION}-arm64 \
              ${{ env.REGISTRY_PREFIX }}/mogenius-operator:${VERSION}-armv7
          fi

  helm-chart:
    if: github.ref == 'refs/heads/main'
    needs: [prepare, operator-manifest]
    runs-on: [self-hosted]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1
        id: install

      - name: Import GPG Key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --import --batch

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Update Helm chart and values yaml-Files
        env:
          VERSION: ${{ needs.prepare.outputs.version }}      
        run: |
          set -x

          cd ./helm/charts/mogenius-operator
          sed -i -E "s/appVersion: \".*\"/appVersion: \"${VERSION}\"/" Chart.yaml
          sed -i -E "s/^version: .*/version: ${VERSION}/" Chart.yaml

      - name: Run helm-docs
        uses: losisin/helm-docs-github-action@a57fae5676e4c55a228ea654a1bcaec8dd3cf5b5 # v1.6.2
        with:
          chart-search-root: helm

      - name: package and push
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -x

          cd ./helm/charts/mogenius-operator

          # Create keyring for Helm (legacy secring format)
          gpg --export-secret-keys > ~/.gnupg/secring.gpg

          # Sign the Helm chart
          echo "Packaging Helm chart"
          helm package . -d /tmp/ --version ${VERSION} --app-version ${VERSION} \
            --sign \
            --key "Helm Charts" \
            --keyring ~/.gnupg/secring.gpg

          echo "Pushing to Mogenius Helm repo"
          curl -XPOST -L -k --data-binary "@/tmp/${{ env.HELMNAME }}-${VERSION}.tgz" https://${{ secrets.MO_HELMUSER }}:${{ secrets.MO_HELMPASS }}@helm.mogenius.com/api/public/charts

          # Upload provenance file
          PROV_FILE="/tmp/${{ env.HELMNAME }}-${VERSION}.tgz.prov"
          curl -u "${{ secrets.MO_HELMUSER }}:${{ secrets.MO_HELMPASS }}" \
            --data-binary "@${PROV_FILE}" \
            https://helm.mogenius.com/api/public/prov

          echo "Pushing to OCI registry"
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
          CHART_DIGEST=$(helm push /tmp/${{ env.HELMNAME }}-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/helm-charts 2>&1 | grep "Digest: sha256:" | awk '{print $2}')
          if [ -z "$CHART_DIGEST" ]; then
            echo "Failed to extract chart digest"
            exit 1
          fi
          echo "Chart digest: $CHART_DIGEST"

          echo "Signing Helm chart with cosign"
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io --username ${{ github.actor }} --password-stdin
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/helm-charts/${{ env.HELMNAME }}@${CHART_DIGEST}
