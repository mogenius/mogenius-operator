name: Build, Package, Release (Dev & Feature Branches)

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for the image'
        required: false
        default: 'dev'
        type: string
  push:
    branches:
      - "**"
      - "!main"
      - "develop"


env:
  REGISTRY_PREFIX: ghcr.io/mogenius
  HELMNAME: "mogenius-operator-dev"

jobs:

  # ============================================================================
  # Prepare - Get version info
  # ============================================================================
  prepare:
    uses: mogenius/github-actions/.github/workflows/semantic-release.yml@c22907f3784c137182aba9aa06e4015e52b3c37b # v1.1.2
    secrets:
      APP_ID: ${{ secrets.RELEASE_APP_ID }}
      APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_SECRET }}
    with:
      version_override: ${{ github.event.inputs.version || '' }}
      default_version: 'dev'

  # ============================================================================
  # Build Operator - Native builds per architecture
  # ============================================================================
  build-operator:
    needs: [prepare]
    uses: mogenius/github-actions/.github/workflows/build-multiarch.yml@c22907f3784c137182aba9aa06e4015e52b3c37b # v1.1.2
    secrets: inherit
    with:
      version: ${{ needs.prepare.outputs.version }}
      image: ghcr.io/mogenius/mogenius-operator-dev
      push_latest: ${{ github.ref_name == 'main' }}
      build_args: |
        DEV_BUILD=yes
      build_args_amd64: |
        GO_BUILDER_IMAGE=ghcr.io/mogenius/go-builder:latest-amd64
        RUST_BUILDER_IMAGE=ghcr.io/mogenius/rust-builder:latest-amd64
        BPFTOOL_IMAGE=ghcr.io/mogenius/bpftool:latest-amd64
        SNOOPY_IMAGE=ghcr.io/mogenius/snoopy:latest-amd64
        RUNTIME_IMAGE=ghcr.io/mogenius/runtime:latest-amd64
      build_args_arm64: |
        GO_BUILDER_IMAGE=ghcr.io/mogenius/go-builder:latest-arm64
        RUST_BUILDER_IMAGE=ghcr.io/mogenius/rust-builder:latest-arm64
        BPFTOOL_IMAGE=ghcr.io/mogenius/bpftool:latest-arm64
        SNOOPY_IMAGE=ghcr.io/mogenius/snoopy:latest-arm64
        RUNTIME_IMAGE=ghcr.io/mogenius/runtime:latest-arm64
      build_args_armv7: |
        GO_BUILDER_IMAGE=ghcr.io/mogenius/go-builder:latest-amd64
        RUST_BUILDER_IMAGE=ghcr.io/mogenius/rust-builder:latest-amd64
        BPFTOOL_IMAGE=ghcr.io/mogenius/bpftool:latest-armv7
        SNOOPY_IMAGE=ghcr.io/mogenius/snoopy:latest-armv7
        RUNTIME_IMAGE=ghcr.io/mogenius/runtime:latest-armv7

  helm-chart:
    if: github.ref == 'refs/heads/develop'
    needs: [prepare, build-operator]
    runs-on: [self-hosted]
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Install Helm
        uses: azure/setup-helm@dda3372f752e03dde6b3237bc9431cdc2f7a02a2 # v5.0.0
        id: install

      - name: Import GPG Key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | base64 -d | gpg --import --batch

      - name: Install cosign
        uses: sigstore/cosign-installer@faadad0cce49287aee09b3a48701e75088a2c6ad # v4.0.0

      - name: Update Helm chart and values yaml-Files
        env:
          VERSION: ${{ needs.prepare.outputs.version }}      
        run: |
          set -x

          cd ./helm/charts/mogenius-operator
          sed -i -e "s/repository: mogenius\/mogenius-operator/repository: mogenius\/mogenius-operator-dev/" values.yaml
          sed -i -e "s/name: mogenius-operator/name: mogenius-operator-dev/" Chart.yaml
          sed -i -E "s/appVersion: \".*\"/appVersion: \"${VERSION}\"/" Chart.yaml
          sed -i -E "s/^version: .*/version: ${VERSION}/" Chart.yaml

      - name: Run helm-docs
        uses: losisin/helm-docs-github-action@3a4528e97c49a5e83de6b78c50c61c8ee5c9f944 # v2
        with:
          chart-search-root: helm

      - name: package and push
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -x

          cd ./helm/charts/mogenius-operator

          # Create keyring for Helm (legacy secring format)
          gpg --export-secret-keys > ~/.gnupg/secring.gpg

          # Sign the Helm chart
          echo "Packaging Helm chart"
          helm package . -d /tmp/ --version ${VERSION} --app-version ${VERSION} \
            --sign \
            --key "Helm Charts" \
            --keyring ~/.gnupg/secring.gpg

          echo "Pushing to Mogenius Helm repo"
          curl -XPOST -L -k --data-binary "@/tmp/${{ env.HELMNAME }}-${VERSION}.tgz" https://${{ secrets.MO_HELMUSER }}:${{ secrets.MO_HELMPASS }}@helm.mogenius.com/api/public/charts

          # Upload provenance file
          PROV_FILE="/tmp/${{ env.HELMNAME }}-${VERSION}.tgz.prov"
          curl -u "${{ secrets.MO_HELMUSER }}:${{ secrets.MO_HELMPASS }}" \
            --data-binary "@${PROV_FILE}" \
            https://helm.mogenius.com/api/public/prov

          echo "Pushing to OCI registry"
          echo ${{ secrets.GITHUB_TOKEN }} | helm registry login ghcr.io --username ${{ github.actor }} --password-stdin
          CHART_DIGEST=$(helm push /tmp/${{ env.HELMNAME }}-${VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/helm-charts 2>&1 | grep "Digest: sha256:" | awk '{print $2}')
          if [ -z "$CHART_DIGEST" ]; then
            echo "Failed to extract chart digest"
            exit 1
          fi
          echo "Chart digest: $CHART_DIGEST"

          echo "Signing Helm chart with cosign"
          echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io --username ${{ github.actor }} --password-stdin
          cosign sign --yes ghcr.io/${{ github.repository_owner }}/helm-charts/${{ env.HELMNAME }}@${CHART_DIGEST}
