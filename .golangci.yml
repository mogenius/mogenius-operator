version: "2"

run:
  timeout: 10m

linters:
  settings:
    staticcheck:
      checks:
        # Default exclusions of golangci-lint v2 ...
        - all
        - -ST1000
        - -ST1003
        - -ST1016
        - -ST1020
        - -ST1021
        - -ST1022
        # ... plus stylecheck rules that were not enforced before the v2 migration
        - -ST1005
        - -ST1006
